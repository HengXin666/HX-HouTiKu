# ============================================================
#  HX-HouTiKu — 前端 PWA 自动部署(Web 端 + 手机端)
#
#  触发条件: push 到 main 分支, 且 frontend/ 目录有变更
#
#  需要在 GitHub Secrets 中配置: 
#    CLOUDFLARE_API_TOKEN  — Cloudflare API Token
#    CLOUDFLARE_ACCOUNT_ID — Cloudflare Account ID
#
#  需要在 GitHub Variables 中配置(Settings → Secrets → Variables): 
#    VITE_API_BASE — 后端 Worker URL, 如 https://hx-houtiku-api.xxx.workers.dev
#
#  构建产物说明: 
#    本项目是 PWA(渐进式 Web 应用), 一次构建同时生成: 
#    - 🖥️ Web 端: 浏览器直接访问
#    - 📱 手机端: 添加到主屏幕后等同原生 App 体验
#    部署到 Cloudflare Pages 后, 全球 CDN 加速, 自动 HTTPS
# ============================================================

name: 🌐 部署前端 PWA(Web + 手机)

on:
  push:
    branches: [main, master]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch: # 支持手动触发

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: 🏗️ 构建并部署 PWA
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📦 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📥 安装依赖
        working-directory: frontend
        run: pnpm install --ignore-scripts
        # sharp 的 native 编译在 CI 中不需要, 跳过 postinstall 脚本

      - name: 🔍 类型检查
        working-directory: frontend
        run: pnpm typecheck

      - name: 🔨 构建生产版本
        working-directory: frontend
        run: pnpm build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}

      - name: 📊 输出构建信息
        working-directory: frontend
        run: |
          echo "📦 构建产物大小: "
          du -sh dist/
          echo ""
          echo "📁 文件列表: "
          find dist -type f | head -30
          echo ""
          echo "🔍 PWA 清单: "
          cat dist/manifest.webmanifest 2>/dev/null || cat dist/manifest.json 2>/dev/null || echo "未找到 manifest 文件"

      - name: 🚀 部署到 Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=hx-houtiku

      - name: ✅ 部署完成
        if: success()
        run: |
          echo "🎉 前端 PWA 部署成功! "
          echo ""
          echo "🖥️  Web 端: 直接在浏览器中打开 Pages URL"
          echo "📱 手机端: 手机浏览器打开 → 添加到主屏幕 → 即可像 App 一样使用"
