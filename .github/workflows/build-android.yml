name: "📱 构建 Android APK"

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  JAVA_VERSION: "17"
  ANDROID_API_LEVEL: 35

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode or create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json
            echo "✅ google-services.json 已写入"
          else
            cat > android/app/google-services.json << 'PLACEHOLDER'
          {
            "project_info": {"project_number": "000000000000", "project_id": "placeholder", "storage_bucket": "placeholder.appspot.com"},
            "client": [{"client_info": {"mobilesdk_app_id": "1:000000000000:android:0000000000000000","android_client_info": {"package_name": "com.hxhoutiku.app"}},"api_key": [{"current_key": "placeholder"}]}],
            "configuration_version": "1"
          }
          PLACEHOLDER
            echo "⚠️ 使用占位 google-services.json（FCM 推送将不可用）"
          fi

      - name: Configure API_BASE
        run: |
          echo "API_BASE=${{ vars.VITE_API_BASE || 'https://configure-me.workers.dev' }}" >> android/gradle.properties

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          # 如果缺少 gradle-wrapper.jar，用 setup-gradle 提供的 gradle 重新生成
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.9
            echo "✅ Gradle Wrapper 已重新生成"
          fi
          chmod +x gradlew

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: hx-houtiku-release
          path: android/app/build/outputs/apk/release/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
