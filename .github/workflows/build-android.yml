name: "📱 构建 Android APK"

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  JAVA_VERSION: "17"
  ANDROID_API_LEVEL: 35

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode google-services.json
        if: ${{ secrets.GOOGLE_SERVICES_JSON != '' }}
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json
          echo "✅ google-services.json 已写入"

      - name: Create placeholder google-services.json
        if: ${{ secrets.GOOGLE_SERVICES_JSON == '' }}
        run: |
          cat > android/app/google-services.json << 'EOF'
          {
            "project_info": {"project_number": "000000000000", "project_id": "placeholder", "storage_bucket": "placeholder.appspot.com"},
            "client": [{"client_info": {"mobilesdk_app_id": "1:000000000000:android:0000000000000000","android_client_info": {"package_name": "com.hxhoutiku.app"}},"api_key": [{"current_key": "placeholder"}]}],
            "configuration_version": "1"
          }
          EOF
          echo "⚠️ 使用占位 google-services.json（FCM 推送将不可用）"

      - name: Configure API_BASE
        run: |
          echo "API_BASE=${{ vars.VITE_API_BASE || 'https://configure-me.workers.dev' }}" >> android/gradle.properties

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Build Release APK
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: hx-houtiku-debug
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: hx-houtiku-release
          path: android/app/build/outputs/apk/release/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
