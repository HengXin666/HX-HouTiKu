name: "📱 构建 Android APK"

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: "17"
  ANDROID_API_LEVEL: 35

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode or create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json
            echo "✅ google-services.json 已写入"
          else
            cat > android/app/google-services.json << 'PLACEHOLDER'
          {
            "project_info": {"project_number": "000000000000", "project_id": "placeholder", "storage_bucket": "placeholder.appspot.com"},
            "client": [{"client_info": {"mobilesdk_app_id": "1:000000000000:android:0000000000000000","android_client_info": {"package_name": "com.hxhoutiku.app"}},"api_key": [{"current_key": "placeholder"}]}],
            "configuration_version": "1"
          }
          PLACEHOLDER
            echo "⚠️ 使用占位 google-services.json（FCM 推送将不可用）"
          fi

      - name: Configure API_BASE (frontend URL for WebView)
        run: |
          # API_BASE should point to the FRONTEND (Cloudflare Pages) URL, not the Worker API.
          # The Android WebView loads the React frontend, which then calls the API via its own config.
          echo "API_BASE=${{ vars.ANDROID_FRONTEND_URL || vars.VITE_FRONTEND_URL || '' }}" >> android/gradle.properties

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
            echo "✅ release.keystore 已写入"
          else
            echo "⚠️ 未配置 ANDROID_KEYSTORE_BASE64，Release APK 将使用 debug 签名"
          fi

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          # 如果缺少 gradle-wrapper.jar，用 setup-gradle 提供的 gradle 重新生成
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.9
            echo "✅ Gradle Wrapper 已重新生成"
          fi
          chmod +x gradlew

      - name: Build Release APK
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ secrets.ANDROID_KEYSTORE_BASE64 && 'release.keystore' || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Get version info
        id: version
        run: |
          # 从 build.gradle.kts 提取 versionName
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' android/app/build.gradle.kts || echo "1.0.0")
          VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K\d+' android/app/build.gradle.kts || echo "1")
          SHORT_SHA=${GITHUB_SHA::7}
          # Use clean semver tag (no -build suffix to avoid GitHub prerelease detection)
          TAG="v${VERSION_NAME}"
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "📌 Version: ${VERSION_NAME} (${VERSION_CODE}) → Tag: ${TAG}"

      - name: Rename APK
        run: |
          APK=$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)
          mv "$APK" "android/app/build/outputs/apk/release/HX-HouTiKu-${{ steps.version.outputs.tag }}-release.apk"
          echo "📦 APK: HX-HouTiKu-${{ steps.version.outputs.tag }}-release.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "🚀 HX-HouTiKu ${{ steps.version.outputs.tag }}"
          prerelease: false
          body: |
            ## 📱 Android Release

            - **版本**: ${{ steps.version.outputs.version_name }} (code: ${{ steps.version.outputs.version_code }})
            - **构建号**: #${{ github.run_number }}
            - **提交**: [`${{ steps.version.outputs.short_sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            - **触发**: ${{ github.event.head_commit.message || 'Manual trigger' }}

            ---
            下载下方 APK 安装即可使用。
          files: android/app/build/outputs/apk/release/HX-HouTiKu-*.apk
          fail_on_unmatched_files: true
          make_latest: true
