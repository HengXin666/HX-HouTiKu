# ============================================================
#  HX-HouTiKu — CI 检查（PR 门禁）
#
#  触发条件：
#    - 所有分支的 push
#    - Pull Request
#
#  不需要额外配置 Secrets，纯代码质量检查
# ============================================================

name: 🔍 CI 检查

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# PR 更新时取消旧的运行
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Worker 后端检查 ───────────────────────────────────
  check-worker:
    name: 🔧 后端类型检查
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: worker/pnpm-lock.yaml

      - name: 📥 安装依赖
        working-directory: worker
        run: pnpm install --frozen-lockfile

      - name: 🔍 TypeScript 类型检查
        working-directory: worker
        run: pnpm typecheck

  # ─── 前端检查 + 构建验证 ───────────────────────────────
  check-frontend:
    name: 🌐 前端检查 + 构建
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: 📥 安装依赖
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: 🔍 TypeScript 类型检查
        working-directory: frontend
        run: pnpm typecheck

      - name: 🔨 构建验证
        working-directory: frontend
        run: pnpm build
        env:
          VITE_API_BASE: https://example.workers.dev  # CI 用占位值即可

      - name: 📊 构建产物体积
        working-directory: frontend
        run: |
          echo "📦 构建产物："
          du -sh dist/
          echo ""
          echo "📁 JS 文件体积（gzip 前）："
          find dist -name '*.js' -exec du -sh {} \; | sort -rh | head -10

  # ─── Python SDK 检查 ───────────────────────────────────
  check-sdk:
    name: 🐍 Python SDK 检查
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 安装 Python + uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: 📥 安装依赖
        working-directory: sdk/python
        run: uv sync

      - name: 🔍 类型检查（如有配置）
        working-directory: sdk/python
        run: |
          if uv run python -c "import pyright" 2>/dev/null; then
            uv run pyright .
          else
            echo "⏭️ 跳过类型检查（未配置 pyright）"
          fi

      - name: 📦 验证包构建
        working-directory: sdk/python
        run: uv build
